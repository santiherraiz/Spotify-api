# Usuarios

usuarios:
  path: /usuarios
  controller: App\Controller\UsuarioController::usuarios
  methods: [GET, POST]

usuario:
  path: /usuarios/{id}
  controller: App\Controller\UsuarioController::usuario
  methods: [GET, PUT, DELETE]

# Plan del usuario

plan_actual:
  path: /usuarios/{userId}/plan
  controller: App\Controller\PlanController::plan_actual
  methods: [GET]

premium:
  path: /usuarios/{userId}/premium
  controller: App\Controller\PlanController::premium
  methods: [POST]

pagos:
  path: /usuarios/{userId}/pagos
  controller: App\Controller\PlanController::pagos
  methods: [GET]

suscripcion:
  path: /suscripciones/{id}
  controller: App\Controller\PlanController::suscripcion
  methods: [GET]

# Configuración

configuracion:
  path: /usuarios/{userId}/configuracion
  controller: App\Controller\ConfiguracionController::configuracion
  methods: [GET, PUT]

